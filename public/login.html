<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Landlord login — DormLink boarding house management." />
  <title>Landlord Login — DormLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Tokens ─────────────────────────────────────── */
    :root {
      --color-primary:      #3B82F6;
      --color-primary-dark: #2563EB;
      --color-primary-light:#DBEAFE;
      --color-bg:           #F8FAFF;
      --color-surface:      #FFFFFF;
      --color-border:       #BFDBFE;
      --color-text:         #1E293B;
      --color-text-muted:   #64748B;
      --color-error:        #EF4444;
      --color-error-bg:     #FEF2F2;
      --color-error-border: #FECACA;
      --color-nav-bg:       rgba(255,255,255,0.92);
      --color-hero-bg:      linear-gradient(135deg,#EFF6FF 0%,#DBEAFE 50%,#BFDBFE 100%);
      --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px; --radius-full: 9999px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
      --font-heading: 'Poppins', sans-serif;
      --font-body:    'Inter', sans-serif;
      --nav-height: 72px;
    }
    [data-theme="dark"] {
      --color-primary:      #60A5FA;
      --color-primary-dark: #3B82F6;
      --color-primary-light:#1E3A5F;
      --color-bg:           #0F172A;
      --color-surface:      #1E293B;
      --color-border:       #2D4A6E;
      --color-text:         #F1F5F9;
      --color-text-muted:   #94A3B8;
      --color-error:        #FCA5A5;
      --color-error-bg:     #2D1515;
      --color-error-border: #7F1D1D;
      --color-nav-bg:       rgba(15,23,42,0.95);
      --color-hero-bg:      linear-gradient(135deg,#0F172A 0%,#162032 50%,#1E293B 100%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--color-hero-bg);
      color: var(--color-text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Navbar ─────────────────────────────────────── */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-height);
      background: var(--color-nav-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border);
    }
    .nav-inner {
      max-width: 1180px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: var(--nav-height);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-heading); font-size: 1.375rem; font-weight: 800;
      color: var(--color-text); text-decoration: none;
    }
    .nav-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-icon svg { width: 20px; height: 20px; fill: #fff; }
    .nav-logo span { color: var(--color-primary); }

    #theme-toggle {
      width: 40px; height: 40px; border-radius: var(--radius-full);
      border: none; background: var(--color-primary-light); color: var(--color-text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    #theme-toggle:hover { color: var(--color-primary); transform: rotate(20deg); }
    #theme-toggle svg { width: 18px; height: 18px; }
    .icon-sun { display: none; }
    .icon-moon { display: block; }
    [data-theme="dark"] .icon-sun  { display: block; }
    [data-theme="dark"] .icon-moon { display: none; }

    /* ── Page Layout ────────────────────────────────── */
    .page-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: calc(var(--nav-height) + 40px) 24px 40px;
    }

    /* ── Login Card ─────────────────────────────────── */
    .login-card {
      width: 100%; max-width: 440px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 44px 40px;
      box-shadow: 0 20px 60px rgba(59,130,246,0.12);
      animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(59,130,246,0.30);
    }
    .login-icon svg { width: 28px; height: 28px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .login-title {
      font-family: var(--font-heading);
      font-size: 1.625rem; font-weight: 700;
      color: var(--color-text);
      text-align: center; margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 0.9rem; color: var(--color-text-muted);
      text-align: center; margin-bottom: 32px; line-height: 1.6;
    }

    /* ── Form ───────────────────────────────────────── */
    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 0.875rem; font-weight: 600; color: var(--color-text);
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--color-text-muted); pointer-events: none;
    }
    .input-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .form-input {
      width: 100%;
      padding: 13px 14px 13px 44px;
      background: var(--color-bg);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-family: var(--font-body); font-size: 0.9375rem;
      color: var(--color-text);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      outline: none;
    }
    .form-input::placeholder { color: var(--color-text-muted); }
    .form-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      background: var(--color-surface);
    }
    .form-input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--color-text-muted); transition: color var(--transition);
      padding: 4px; display: flex; align-items: center;
    }
    .pw-toggle:hover { color: var(--color-primary); }
    .pw-toggle svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Error Banner */
    #error-banner {
      display: none;
      background: var(--color-error-bg);
      border: 1px solid var(--color-error-border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.875rem;
      color: var(--color-error);
      display: flex; align-items: center; gap: 8px;
    }
    #error-banner.hidden { display: none !important; }
    #error-banner svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

    /* Submit Button */
    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--color-primary);
      color: #fff;
      font-family: var(--font-body); font-size: 1rem; font-weight: 700;
      border: none; border-radius: var(--radius-full);
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 16px rgba(59,130,246,0.30);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .btn-submit:hover {
      background: var(--color-primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.40);
    }
    .btn-submit:disabled {
      opacity: 0.65; cursor: not-allowed; transform: none;
    }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Back link */
    .back-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 24px;
      font-size: 0.875rem; font-weight: 500; color: var(--color-text-muted);
      text-decoration: none; transition: color var(--transition);
    }
    .back-link:hover { color: var(--color-primary); }
    .back-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Blobs */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(80px);
      opacity: 0.18; pointer-events: none; z-index: 0;
    }
    .blob-1 { width: 400px; height: 400px; background: var(--color-primary); top: -100px; right: -100px; }
    .blob-2 { width: 300px; height: 300px; background: #60A5FA; bottom: -60px; left: -60px; }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>

<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- Navbar -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" id="nav-logo">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        Dorm<span>Link</span>
      </a>
      <button id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- Login Card -->
  <div class="page-wrap">
    <div class="login-card">

      <div class="login-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>

      <h1 class="login-title">Landlord Login</h1>
      <p class="login-subtitle">Sign in to manage your boarding house listings.</p>

      <!-- Error Banner -->
      <div id="error-banner" class="hidden" role="alert">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-msg">Invalid username or password.</span>
      </div>

      <form id="login-form" novalidate>

        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
            <input
              class="form-input" type="text" id="username" name="username"
              placeholder="Enter your username"
              autocomplete="username" required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input
              class="form-input" type="password" id="password" name="password"
              placeholder="Enter your password"
              autocomplete="current-password" required
            />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility">
              <svg id="eye-show" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-hide" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <div class="spinner"></div>
          <span class="btn-text">Sign In</span>
        </button>

      </form>

      <a href="index.html" class="back-link" id="back-to-home">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Home
      </a>

    </div>
  </div>

  <script>
    // Apply theme before render
    (function () {
      const t = localStorage.getItem('dormlink-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();

    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('dormlink-theme', next);
    });

    // If already logged in, redirect to dashboard
    fetch('/api/auth/status')
      .then(r => r.json())
      .then(data => { if (data.loggedIn) window.location.href = 'dashboard.html'; })
      .catch(() => {});

    // Password toggle
    const pwToggle = document.getElementById('pw-toggle');
    const pwInput  = document.getElementById('password');
    const eyeShow  = document.getElementById('eye-show');
    const eyeHide  = document.getElementById('eye-hide');
    pwToggle.addEventListener('click', () => {
      const visible = pwInput.type === 'text';
      pwInput.type   = visible ? 'password' : 'text';
      eyeShow.style.display = visible ? 'block' : 'none';
      eyeHide.style.display = visible ? 'none'  : 'block';
    });

    // Login form
    const form      = document.getElementById('login-form');
    const errorBanner = document.getElementById('error-banner');
    const errorMsg    = document.getElementById('error-msg');
    const submitBtn   = document.getElementById('submit-btn');
    const usernameInput = document.getElementById('username');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBanner.classList.remove('hidden');
    }
    function hideError() {
      errorBanner.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = usernameInput.value.trim();
      const password = pwInput.value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      // Show loading state
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await resp.json();

        if (data.success) {
          window.location.href = 'dashboard.html';
        } else {
          showError(data.message || 'Invalid username or password.');
          usernameInput.classList.add('error');
          pwInput.classList.add('error');
        }
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });

    // Remove error styling on input
    [usernameInput, pwInput].forEach(el => {
      el.addEventListener('input', () => {
        el.classList.remove('error');
        hideError();
      });
    });
  </script>
</body>
</html>
