<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse all available boarding houses on DormLink." />
  <title>Browse Listings — DormLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --color-primary: #3B82F6;
      --color-primary-dark: #2563EB;
      --color-primary-light: #DBEAFE;
      --color-accent: #60A5FA;
      --color-bg: #F8FAFF;
      --color-surface: #FFFFFF;
      --color-surface-alt: #EFF6FF;
      --color-border: #BFDBFE;
      --color-text: #1E293B;
      --color-text-muted: #64748B;
      --color-text-light: #94A3B8;
      --color-nav-bg: rgba(255, 255, 255, 0.92);
      --color-card-shadow: 0 4px 24px rgba(59, 130, 246, 0.10);
      --color-card-shadow-h: 0 8px 40px rgba(59, 130, 246, 0.18);
      --color-success: #22C55E;
      --color-danger: #EF4444;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-full: 9999px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font-heading: 'Poppins', sans-serif;
      --font-body: 'Inter', sans-serif;
      --nav-height: 72px;
    }

    [data-theme="dark"] {
      --color-primary: #60A5FA;
      --color-primary-dark: #3B82F6;
      --color-primary-light: #1E3A5F;
      --color-accent: #93C5FD;
      --color-bg: #0F172A;
      --color-surface: #1E293B;
      --color-surface-alt: #162032;
      --color-border: #2D4A6E;
      --color-text: #F1F5F9;
      --color-text-muted: #94A3B8;
      --color-text-light: #64748B;
      --color-nav-bg: rgba(15, 23, 42, 0.95);
      --color-card-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      --color-card-shadow-h: 0 8px 40px rgba(0, 0, 0, 0.50);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    /* ── Navbar ─────────────────────────────────────── */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--nav-height);
      background: var(--color-nav-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border);
      box-shadow: 0 2px 16px rgba(59, 130, 246, 0.06);
    }

    .nav-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--nav-height);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-heading);
      font-size: 1.375rem;
      font-weight: 800;
      color: var(--color-text);
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-logo-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .nav-logo span {
      color: var(--color-primary);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text-muted);
      padding: 8px 14px;
      border-radius: var(--radius-full);
      transition: all var(--transition);
    }

    .btn-back:hover {
      background: var(--color-primary-light);
      color: var(--color-primary);
    }

    .btn-back svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      border: none;
      background: var(--color-surface-alt);
      color: var(--color-text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    #theme-toggle:hover {
      color: var(--color-primary);
    }

    #theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    .icon-sun {
      display: none;
    }

    .icon-moon {
      display: block;
    }

    [data-theme="dark"] .icon-sun {
      display: block;
    }

    [data-theme="dark"] .icon-moon {
      display: none;
    }

    /* ── Page Header ────────────────────────────────── */
    .page-header {
      background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-surface) 100%);
      padding: calc(var(--nav-height) + 40px) 0 40px;
      border-bottom: 1px solid var(--color-border);
    }

    [data-theme="dark"] .page-header {
      background: linear-gradient(135deg, #1a2a45 0%, var(--color-surface) 100%);
    }

    .page-header-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .page-header-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-primary);
      margin-bottom: 8px;
    }

    .page-header-title {
      font-family: var(--font-heading);
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 6px;
    }

    .page-header-sub {
      font-size: 0.9375rem;
      color: var(--color-text-muted);
    }

    /* ── Main Layout ────────────────────────────────── */
    .main-layout {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      align-items: start;
    }

    /* ── Sidebar Filters ────────────────────────────── */
    .sidebar {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      position: sticky;
      top: calc(var(--nav-height) + 20px);
      box-shadow: var(--color-card-shadow);
    }

    .sidebar-title {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-reset {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-primary);
      background: none;
      border: none;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .sidebar-reset:hover {
      opacity: 0.75;
    }

    .filter-group {
      margin-bottom: 24px;
    }

    .filter-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      display: block;
    }

    .filter-select,
    .filter-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--color-bg);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--color-text);
      outline: none;
      transition: border-color var(--transition);
      cursor: pointer;
    }

    .filter-select:focus,
    .filter-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    .price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .price-input-wrap {
      position: relative;
    }

    .price-prefix {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.875rem;
      color: var(--color-text-muted);
    }

    .filter-input.price {
      padding-left: 24px;
    }

    .apply-btn {
      width: 100%;
      padding: 12px;
      background: var(--color-primary);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      margin-top: 4px;
      transition: background var(--transition), transform var(--transition);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
    }

    .apply-btn:hover {
      background: var(--color-primary-dark);
      transform: translateY(-1px);
    }

    /* ── Content Area ───────────────────────────────── */

    .search-bar-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      pointer-events: none;
    }

    .search-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #search-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--color-text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      box-shadow: var(--color-card-shadow);
    }

    #search-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    #search-input::placeholder {
      color: var(--color-text-muted);
    }

    /* Results meta */
    .results-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .results-count {
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }

    .results-count strong {
      color: var(--color-text);
    }

    /* Listing Grid */
    #listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* Listing Card */
    .listing-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .listing-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--color-card-shadow-h);
    }

    .card-img {
      width: 100%;
      height: 190px;
      background: linear-gradient(135deg, var(--color-primary-light), var(--color-primary));
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .listing-card:hover .card-img img {
      transform: scale(1.05);
    }

    .card-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      opacity: 0.5;
    }

    .card-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .badge-available {
      background: var(--color-success);
      color: #fff;
    }

    .badge-full {
      background: var(--color-danger);
      color: #fff;
    }

    .card-room-type {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      color: #fff;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .card-body {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-name {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-address {
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      display: flex;
      align-items: flex-start;
      gap: 4px;
      line-height: 1.4;
    }

    .card-address svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .card-amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }

    .amenity-tag {
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--color-surface-alt);
      color: var(--color-text-muted);
      padding: 3px 8px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--color-border);
    }

    .card-price {
      font-family: var(--font-heading);
      font-size: 1.125rem;
      font-weight: 800;
      color: var(--color-primary);
    }

    .card-price span {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--color-text-muted);
    }

    .card-view-btn {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--color-primary);
      background: var(--color-primary-light);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      transition: all var(--transition);
    }

    .card-view-btn:hover {
      background: var(--color-primary);
      color: #fff;
    }

    /* ── Empty State ────────────────────────────────── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 80px 24px;
      grid-column: 1 / -1;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-title {
      font-family: var(--font-heading);
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 10px;
    }

    .empty-desc {
      font-size: 0.9375rem;
      color: var(--color-text-muted);
    }

    /* ── Loader ─────────────────────────────────────── */
    #loader {
      grid-column: 1 / -1;
      padding: 80px;
      text-align: center;
    }

    .loader-spinner {
      width: 44px;
      height: 44px;
      margin: 0 auto 16px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      color: var(--color-text-muted);
      font-size: 0.9rem;
    }

    /* ── Mobile Sidebar Toggle ──────────────────────── */
    #filter-toggle {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: 10px 18px;
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all var(--transition);
      margin-bottom: 16px;
    }

    #filter-toggle:hover {
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    #filter-toggle svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .sidebar {
        position: static;
        display: none;
        margin-bottom: 24px;
      }

      .sidebar.open {
        display: block;
      }

      #filter-toggle {
        display: flex;
      }
    }

    @media (max-width: 480px) {
      .main-layout {
        padding: 24px 16px 48px;
      }

      #listings-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav id="navbar">
    <div class="nav-inner">
      <div style="display: flex; align-items: center; gap: 16px;">
        <a href="index.html" class="btn-back" id="nav-home" style="padding-left: 0; padding-right: 0;">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Home
        </a>
        <a href="index.html" class="nav-logo" id="nav-logo">
          <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          </div>
          Dorm<span>Link</span>
        </a>
      </div>
      <div class="nav-right">
        <button id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-header-label">DormLink Marketplace</div>
      <h1 class="page-header-title">Browse Boarding Houses</h1>
      <p class="page-header-sub" id="header-sub">Loading listings...</p>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main-layout">

    <!-- Sidebar -->
    <aside>
      <button id="filter-toggle" aria-expanded="false">
        <svg viewBox="0 0 24 24">
          <line x1="4" y1="6" x2="20" y2="6" />
          <line x1="8" y1="12" x2="16" y2="12" />
          <line x1="11" y1="18" x2="13" y2="18" />
        </svg>
        Filters
      </button>

      <div class="sidebar" id="sidebar">
        <div class="sidebar-title">
          Filters
          <button class="sidebar-reset" id="reset-filters">Reset</button>
        </div>

        <div class="filter-group">
          <label class="filter-label" for="filter-availability">Availability</label>
          <select class="filter-select" id="filter-availability">
            <option value="All">All</option>
            <option value="Available">Available</option>
            <option value="Full">Full</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label" for="filter-room-type">Room Type</label>
          <select class="filter-select" id="filter-room-type">
            <option value="All">All Types</option>
            <option value="Solo Room">Solo Room</option>
            <option value="Shared Room">Shared Room</option>
            <option value="Bedspace">Bedspace</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">Monthly Rent (₱)</label>
          <div class="price-row">
            <div class="price-input-wrap">
              <span class="price-prefix">₱</span>
              <input class="filter-input price" type="number" id="filter-min-rent" placeholder="Min" min="0" />
            </div>
            <div class="price-input-wrap">
              <span class="price-prefix">₱</span>
              <input class="filter-input price" type="number" id="filter-max-rent" placeholder="Max" min="0" />
            </div>
          </div>
        </div>

        <button class="apply-btn" id="apply-filters">Apply Filters</button>
      </div>
    </aside>

    <!-- Content -->
    <div class="content-area">

      <!-- Search -->
      <div class="search-bar-wrap">
        <span class="search-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </span>
        <input type="search" id="search-input" placeholder="Search by name or address..." autocomplete="off" />
      </div>

      <!-- Results Meta -->
      <div class="results-meta">
        <div class="results-count" id="results-count"></div>
      </div>

      <!-- Grid -->
      <div id="listings-grid">
        <!-- Loader -->
        <div id="loader">
          <div class="loader-spinner"></div>
          <p class="loader-text">Loading listings...</p>
        </div>
      </div>

      <!-- Empty State -->
      <div id="empty-state">
        <div class="empty-icon">🏠</div>
        <div class="empty-title">No boarding houses available yet.</div>
        <p class="empty-desc">Check back later — new listings will appear here when the landlord adds them.</p>
      </div>

    </div>
  </div>

  <script>
    // Apply theme
    (function () {
      const t = localStorage.getItem('dormlink-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('dormlink-theme', next);
    });

    // Filter toggle (mobile)
    const filterToggle = document.getElementById('filter-toggle');
    const sidebar = document.getElementById('sidebar');
    filterToggle.addEventListener('click', () => {
      const open = sidebar.classList.toggle('open');
      filterToggle.setAttribute('aria-expanded', open);
    });

    // State
    let allListings = [];
    let searchTimer = null;

    // ── Fetch Listings ────────────────────────────────
    async function fetchListings(params = {}) {
      const loader = document.getElementById('loader');
      const grid = document.getElementById('listings-grid');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('results-count');
      const headerSub = document.getElementById('header-sub');

      loader.style.display = 'block';
      empty.style.display = 'none';
      // Clear cards (keep loader)
      Array.from(grid.children).forEach(c => { if (c.id !== 'loader') c.remove(); });

      const qs = new URLSearchParams();
      if (params.search) qs.set('search', params.search);
      if (params.roomType && params.roomType !== 'All') qs.set('roomType', params.roomType);
      if (params.availability && params.availability !== 'All') qs.set('availability', params.availability);
      if (params.minRent) qs.set('minRent', params.minRent);
      if (params.maxRent) qs.set('maxRent', params.maxRent);

      try {
        const resp = await fetch('/api/listings?' + qs.toString());
        const data = await resp.json();
        loader.style.display = 'none';

        if (!data.success || data.data.length === 0) {
          empty.style.display = 'block';
          count.textContent = '';
          headerSub.textContent = 'No listings found.';
          return;
        }

        allListings = data.data;
        count.innerHTML = `Showing <strong>${data.data.length}</strong> listing${data.data.length !== 1 ? 's' : ''}`;
        headerSub.textContent = `${data.data.length} listing${data.data.length !== 1 ? 's' : ''} available`;
        renderCards(data.data);
      } catch (err) {
        loader.style.display = 'none';
        empty.style.display = 'block';
        empty.querySelector('.empty-title').textContent = 'Failed to load listings.';
        empty.querySelector('.empty-desc').textContent = 'Please check your connection and try again.';
      }
    }

    // ── Render Cards ──────────────────────────────────
    function renderCards(listings) {
      const grid = document.getElementById('listings-grid');
      // Remove existing cards
      Array.from(grid.children).forEach(c => { if (c.id !== 'loader') c.remove(); });

      if (listings.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('results-count').innerHTML = 'No listings match your search.';
        return;
      }
      document.getElementById('empty-state').style.display = 'none';

      listings.forEach(listing => {
        const card = document.createElement('div');
        card.className = 'listing-card';
        card.addEventListener('click', () => {
          window.location.href = `listing-detail.html?id=${listing.id}`;
        });

        const amenities = [];
        if (listing.amenity_wifi) amenities.push('WiFi');
        if (listing.amenity_aircon) amenities.push('Aircon');
        if (listing.amenity_electric_fan) amenities.push('Fan');
        if (listing.amenity_private_cr) amenities.push('Private CR');
        if (listing.amenity_kitchen) amenities.push('Kitchen');
        if (listing.amenity_parking) amenities.push('Parking');
        if (listing.amenity_cctv) amenities.push('CCTV');

        const shown = amenities.slice(0, 3);
        const extra = amenities.length - shown.length;

        const isAvailable = listing.availability_status === 'Available';
        const imgSrc = listing.image_filename
          ? `/uploads/${listing.image_filename}`
          : null;

        card.innerHTML = `
          <div class="card-img">
            ${imgSrc
            ? `<img src="${imgSrc}" alt="${escHtml(listing.name)}" loading="lazy" />`
            : `<div class="card-img-placeholder">🏠</div>`
          }
            <span class="card-badge ${isAvailable ? 'badge-available' : 'badge-full'}">
              ${isAvailable ? 'Available' : 'Full'}
            </span>
            <span class="card-room-type">${escHtml(listing.room_type)}</span>
          </div>
          <div class="card-body">
            <div class="card-name">${escHtml(listing.name)}</div>
            <div class="card-address">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${escHtml(listing.address)}
            </div>
            ${shown.length > 0 ? `
              <div class="card-amenities">
                ${shown.map(a => `<span class="amenity-tag">${a}</span>`).join('')}
                ${extra > 0 ? `<span class="amenity-tag">+${extra} more</span>` : ''}
              </div>
            ` : ''}
            <div class="card-footer">
              <div class="card-price">₱${Number(listing.monthly_rent).toLocaleString()} <span>/mo</span></div>
              <span class="card-view-btn">View Details</span>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ── Collect Filter Params ─────────────────────────
    function getFilterParams() {
      return {
        search: document.getElementById('search-input').value.trim(),
        roomType: document.getElementById('filter-room-type').value,
        availability: document.getElementById('filter-availability').value,
        minRent: document.getElementById('filter-min-rent').value,
        maxRent: document.getElementById('filter-max-rent').value,
      };
    }

    // ── Event: Apply / Search ─────────────────────────
    document.getElementById('apply-filters').addEventListener('click', () => {
      fetchListings(getFilterParams());
      // Close mobile sidebar
      sidebar.classList.remove('open');
      filterToggle.setAttribute('aria-expanded', 'false');
    });

    document.getElementById('search-input').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => fetchListings(getFilterParams()), 350);
    });

    document.getElementById('reset-filters').addEventListener('click', () => {
      document.getElementById('filter-availability').value = 'All';
      document.getElementById('filter-room-type').value = 'All';
      document.getElementById('filter-min-rent').value = '';
      document.getElementById('filter-max-rent').value = '';
      document.getElementById('search-input').value = '';
      fetchListings();
    });

    // ── Initial Load ──────────────────────────────────
    fetchListings();
  </script>

</body>

</html>
